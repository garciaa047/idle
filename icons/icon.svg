<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Placeholder forge/lattice glyph on a dark cosmic background. Redesign in Phase 8. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1b2747"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b8cff"/>
      <stop offset="100%" stop-color="#b06bff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Lattice: a hexagon with internal spokes meeting a central node. -->
  <g fill="none" stroke="url(#stroke)" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="256,96 392,176 392,336 256,416 120,336 120,176"/>
    <line x1="256" y1="96" x2="256" y2="256"/>
    <line x1="392" y1="176" x2="256" y2="256"/>
    <line x1="392" y1="336" x2="256" y2="256"/>
    <line x1="256" y1="416" x2="256" y2="256"/>
    <line x1="120" y1="336" x2="256" y2="256"/>
    <line x1="120" y1="176" x2="256" y2="256"/>
  </g>
  <circle cx="256" cy="256" r="34" fill="url(#stroke)"/>
</svg>
